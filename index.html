<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f7f1e5">
<title>Maturità 2026 — Quaderno di ripasso</title>
<meta name="description" content="Planner, schede, quiz e flashcard per la maturità 2026 — liceo delle scienze umane.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>📖</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,800;1,9..144,500&family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <h1 class="brand">Maturità <span class="brand-year">2026</span></h1>
    <div class="countdown" id="countdown"></div>
  </div>
</header>

<main id="view" class="view" aria-live="polite"></main>

<nav class="tabbar" aria-label="Sezioni">
  <button class="tab" data-tab="piano" aria-label="Piano di studio">
    <span class="tab-ico">✦</span><span class="tab-label">Piano</span>
  </button>
  <button class="tab" data-tab="schede" aria-label="Schede di ripasso">
    <span class="tab-ico">❡</span><span class="tab-label">Schede</span>
  </button>
  <button class="tab" data-tab="quiz" aria-label="Quiz">
    <span class="tab-ico">?</span><span class="tab-label">Quiz</span>
  </button>
  <button class="tab" data-tab="carte" aria-label="Flashcard">
    <span class="tab-ico">⁂</span><span class="tab-label">Carte</span>
  </button>
</nav>

<script src="js/planner.js"></script>
<script src="js/quiz.js"></script>
<script src="js/flashcards.js"></script>
<script src="js/app.js"></script>
</body>
</html>
